# Configuración del buscador de empleo
# Perfil: soporte técnico / call center en español (sin inglés) y desarrollador junior, con modalidad seleccionable

# Modalidades de trabajo. Cada una agrupa las palabras que la identifican
# en el texto de la oferta; al menos una debe aparecer para que la oferta
# se considere. `activa` define la selección por defecto (CLI y panel web).
modalidades:
  remoto:
    activa: true
    palabras:
      - remoto
      - remota
      - teletrabajo
      - home office
      - desde casa
      - trabajo remoto
  hibrido:
    activa: false
    palabras:
      - híbrido
      - hibrido
      - híbrida
      - mixto
      - mixta
  presencial:
    activa: false
    palabras:
      - presencial
      - oficina
      - en sede

# Palabras que suman puntos de relevancia si aparecen (perfil objetivo)
palabras_clave_positivas:
  soporte: 8
  soporte tecnico: 10
  soporte al cliente: 10
  mesa de ayuda: 10
  helpdesk: 10
  service desk: 10
  call center: 9
  contact center: 9
  atención al cliente: 9
  atencion al cliente: 9
  servicio al cliente: 9
  agente: 5
  asesor: 6
  programador: 8
  desarrollador: 8
  desarrollo: 5
  junior: 7
  jr: 7
  trainee: 7
  entry level: 7
  practicante: 7
  aprendiz: 6
  python: 6
  php: 5
  javascript: 5
  sql: 5
  mysql: 5
  freelance: 5
  part-time: 4
  medio tiempo: 4
  horario flexible: 4

# Palabras que restan puntos o descalifican (inglés requerido, seniority alto, nube/infraestructura)
palabras_clave_negativas:
  inglés: -8
  ingles: -8
  english: -8
  bilingüe: -8
  bilingue: -8
  senior: -10
  sr: -10
  lead: -10
  architect: -10
  arquitecto: -10
  10 años: -10
  8 años: -8
  7 años: -7
  5 años: -5
  cloud: -3
  aws: -3
  azure: -3
  gcp: -3
  devops: -3
  infraestructura: -3
  sysadmin: -3

# Puntos extra si una de estas palabras aparece en el TÍTULO de la oferta
bonus_titulo:
  puntos: 3
  palabras:
    - soporte
    - mesa de ayuda
    - helpdesk
    - call center
    - programador
    - desarrollador
    - junior
    - agente

# Umbral mínimo de puntos para considerar una oferta relevante
umbral_relevancia: 8

# Términos de búsqueda por portal
busquedas:
  elempleo:
    - remoto soporte tecnico
    - call center remoto español
    - mesa de ayuda remota
    - programador junior remoto
    - agente servicio al cliente remoto
  infojobs:
    - teletrabajo soporte tecnico
    - programador junior remoto
    - call center remoto
    - desarrollador junior remoto

# Configuración de requests
requests:
  delay_entre_paginas_segundos: 2
  timeout_segundos: 15
  max_intentos: 3
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"

# Notificaciones (opcional)
# Para Telegram:
#   1. Crea un bot con @BotFather y copia el token que te da.
#   2. Escribe un mensaje a tu bot y obtén tu chat ID con @userinfobot
#      o visita https://api.telegram.org/bot<TU_TOKEN>/getUpdates
#   3. Pega ambos valores aquí.
notificaciones:
  telegram:
    bot_token: ""           
    chat_id: ""             
  email:
    smtp_host: ""
    smtp_port: 587
    usuario: ""
    password: ""
    destinatario: ""
